# Use plugins instead of require for modern RuboCop versions
plugins:
  - rubocop-rails
  - rubocop-performance
  - rubocop-rspec
  - rubocop-capybara
  - rubocop-factory_bot

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  # Note: Ruby 3.3.11 doesn't exist yet (3.3.1 is current stable), 
  # but RuboCop usually just needs the major.minor version.
  Exclude:
    - 'bin/**/*'
    - 'db/**/*'
    - 'config/**/*'
    - 'spec/**/*'
    - 'client/node_modules/**/*'
    - 'vendor/**/*'
    - 'Gemfile'

Style/Documentation:
  Enabled: false

# This is now handled by the plugin system above
# Rails:
#   Enabled: true

# The bug from version 0.48 is long gone. 
# You can keep this disabled if you prefer the style, 
# otherwise, feel free to remove it to catch actual ambiguous blocks.
Lint/AmbiguousBlockAssociation:
  Enabled: false

Rails/OutputSafety:
  Enabled: false

Rails/SkipsModelValidations:
  Enabled: false

Rails/InverseOf:
  Enabled: false

Rails/HasManyOrHasOneDependent:
  Enabled: false

Rails/HelperInstanceVariable:
  Enabled: false

Style/MixinUsage:
  Enabled: false

Layout/EmptyLineAfterMagicComment:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Style/HashEachMethods:
  Enabled: true

Style/HashTransformKeys:
  Enabled: true

Style/HashTransformValues:
  Enabled: true

Metrics/MethodLength:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Layout/LineLength:
  AllowedPatterns: ['\A#']

Metrics/ClassLength:
  Enabled: false