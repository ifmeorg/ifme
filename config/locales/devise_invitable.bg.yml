bg:
  devise:
    failure:
      invited: >-
        Имаш чакаща покана, приеми я, за да завършиш създаването на акаунта си.
    invitations:
      send_instructions: 'Изпратен е имейл с покана до %{email}.'
      failed_send: 'Възникна грешка. %{email} не можа да бъде поканен.'
      invitation_token_invalid: Предоставеният токен за покана не е валиден!
      updated: Паролата ти е зададена успешно. Вече си влязъл/а.
      updated_not_active: Паролата ти е зададена успешно.
      no_invitations_remaining: Няма останали покани
      invitation_removed: Поканата ти бе премахната.
      new:
        header: Изпрати покана до близък човек
        submit_button: Изпрати покана
      edit:
        header: Задай паролата си
        submit_button: Задай паролата ми
    mailer:
      invitation_instructions:
        subject: 'if-me.org | %{name} те покани да се присъединиш към if-me.org!'
        subject_nameless: if-me.org | Някой те покани да се присъединиш към if-me.org!
        hello: 'Здравей, %{email}!'
        someone_invited_you: >-
          %{name} те покани да се присъединиш към http://www.if-me.org,
          общност за споделяне на преживявания в областта на психичното здраве
          с близките ти и за проследяване на настроенията, лекарствата и
          грижата за себе си. Можеш да приемеш поканата чрез връзката
          по-долу.
        accept: Приеми поканата!
        accept_until: 'Тази покана ще изтече на %{due_date}.'
        ignore: >-
          Ако не искаш да приемеш поканата, игнорирай този
          имейл.<br/>Акаунтът ти няма да бъде създаден, докато не отвориш
          връзката по-горе и не зададеш паролата си.
