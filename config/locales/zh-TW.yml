  pages:
    about:
      main_message_one: >-
        %{app_name} 是促進心理健康的社群，鼓勵人們與信任的夥伴分享個人故事。
      message_text_one: >-
        每天互動的朋友、家人、同事、老師和心理健康工作者，都可以是信任的夥伴。
      main_message_two: >-
        面對心理健康議題是身為人的一部分。但對許多人來說，要坦然面對並不容易。
      message_text_two: >-
        並非每個人都是諮商師或治療師。我們每天互動的對象會影響我們的情緒和行為。讓他們參與心理健康照護，是邁向復原的關鍵。
      message_text_three: >-
        <strong>想贊助我們嗎？</strong>2016 年，我們獲得了 Linebreak 的社群補助。2017
        年，我們獲得了 %{fund_club_link} 的資助。您可以藉由捐款至我們的
        %{open_collective_link} 來支援我們。
