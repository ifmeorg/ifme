    blog:
      description: >-
        如果您有興趣為我們撰稿，請來信 %{email}！我們也歡迎匿名投稿。
    contribute:
      contributor_avatar_alt: '貢獻者介紹：%{name}'
      message_text_one: >-
        我們隨時歡迎各方好手提供想法，包括<strong>心理健康倡議者</strong>、<strong>健康專業人員</strong>、<strong>軟體開發人員</strong>、<strong>翻譯人員</strong>和<strong>使用者體驗設計師</strong>！<p
        class="noMarginBottom">請來信 %{email_link}，我們會與您聯絡！您將受邀加入我們的
        %{slack_link} 頁面，這是我們主要的溝通工具。也歡迎 Fork 我們在 %{github_link}
        上的原始程式碼庫！</p>
      more_contributors: 更多優秀的貢獻者！
      thanks: 特別感謝
      slack: Slack
    faq:
      title: 常見問題
      data_access_question: 誰可以存取我的資料？
      data_access_answer: >-
        資料不會提供給任何第三方，也不會讓第三方存取。刪除帳號將會移除您所有的資料。<br
        /><br />系統會在網站內分析使用者資料，以提供客製化的推薦。<br /><br
        />建立使用者帳號需要提供姓名和電子郵件地址。若透過 Facebook 或 Google
        驗證身分，系統會將您的大頭照和姓名用於帳號中。
      moment_question: 什麼是心情記事？
      moment_answer: >-
        <strong>%{moment}</strong>是影響您心理健康的事件和情境，可以是正面或負面的。您可以把它想成日記或動態更新。<br
        /><br />您可以為心情記事標記策略、分類和情緒。您也可以選擇哪些夥伴能觀看和留言。您也可以將心情記事設為僅自己可見。<br
        /><br /><strong>%{moment_templates}</strong>讓您建立可重複使用的撰寫提示。
      strategy_question: 什麼是策略？
      strategy_answer: >-
        <strong>%{strategy}</strong>是一種有助於您應對或專注於復原的活動、思維方式或自我照護形式。<br
        /><br />您可以為策略標記分類。您也可以選擇哪些夥伴能觀看和留言。您也可以將策略設為僅自己可見。分享的策略對所有指定的夥伴都可見，這表示您可以用他們的策略來標記您的心情記事！
      category_question: 什麼是分類？
      category_answer: >-
        <strong>%{category}</strong>是一種標籤，可代表對您重要的人物、地點和事物。
      mood_question: 什麼是情緒？
      mood_answer: >-
        <strong>%{mood}</strong>是描述您心理狀態、感受和情感的標籤。
      group_question: 什麼是群組？
      group_answer: >-
        <strong>%{group}</strong>提供心理健康方面的支援、指導和討論。您可以建立群組，您的夥伴可以選擇加入。您只能加入由您的夥伴所建立的群組。<br
        /><br />身為群組組長，您可以建立<strong>聚會</strong>。聚會有地點和時間。地點可以是街道地址或視訊會議網址。聚會也允許留言。如果您是群組組長，除非另有其他組長，否則無法離開群組。群組只有在您是唯一成員時才能刪除。
      medications_question: 如何使用藥物功能？
      medications_answer: >-
        <strong>%{medications}</strong>功能讓您記錄正在服用的處方藥物，您也可以記錄您的症狀。
      care_plan_question: 如何使用照護計畫功能？
      care_plan_answer: >-
        <strong>%{care_plan}</strong>功能讓您保留一份在困難時期應該聯絡的親友名單，並將您最喜歡的自我照護策略加入書籤。
      invite_question: 如何邀請親友加入此應用程式？
      invite_answer: >-
        前往<strong>%{allies}</strong>頁面，按一下「邀請您的親朋好友」連結。您可以用電子郵件邀請他們。當親友接受邀請後，系統會將他們加入您的夥伴清單。
      email_notifications_question: 如何修改電子郵件通知？
      email_notifications_answer: >-
        前往<strong>%{accounts}</strong>頁面。您可以在此修改電子郵件、密碼、大頭照和個人簡介。您也可以刪除帳號。一旦刪除帳號，所有資料都會被移除。
