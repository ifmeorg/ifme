    privacy:
      summary: 摘要
      summary_description: >-
        <p>本隱私權政策適用於本網站，並管轄選擇使用本網站的使用者之隱私。</p><p>鑑於網站內容的敏感性，隱私對我們而言是極為重要的議題。本政策旨在說明使用者資料的蒐集方式、用途及保護方式。</p>
      user_data: 使用者資料
      user_data_description: >-
        <p>如需更多本網站功能資訊，請參閱 %{faq_link} 頁面。</p>
      data_protection_rights: 資料保護權利
      data_protection_rights_answer: >-
        <p>每位使用者都享有以下權利：</p><p>存取權——使用者有權要求我們提供其個人資料的副本。我們可能會為此服務收取少許費用。</p><p>更正權——使用者有權要求我們更正他們認為不正確的任何資訊。使用者也有權要求我們補充他們認為不完整的資訊。</p><p>刪除權——在特定條件下，使用者有權要求我們刪除其個人資料。</p><p>限制處理權——在特定條件下，使用者有權要求我們限制對其個人資料的處理。</p><p>反對處理權——在特定條件下，使用者有權反對我們處理其個人資料。</p><p>資料可攜權——在特定條件下，使用者有權要求我們將所蒐集的資料轉移給其他組織，或直接轉移給使用者本人。</p><p>收到請求後，我們會在一個月內回覆。</p>
      cookies: Cookie 的使用
      cookies_description: >-
        <p>本網站使用 Cookie 來改善使用者瀏覽網站時的體驗。功能性 Cookie
        用於驗證身分及記住先前選擇的偏好設定，例如您偏好的語言和所在位置。在適用的情況下，本網站使用
        Cookie 控制系統，讓使用者在首次造訪網站時可以允許或拒絕在其電腦/裝置上使用
        Cookie。</p><p>Cookie
        是儲存在使用者電腦硬碟上的小型檔案，用於追蹤、儲存使用者與網站互動和使用情況的資訊。這讓網站能藉由伺服器為使用者提供量身規劃的體驗。</p><p>若使用者希望拒絕本網站在其電腦硬碟上使用和儲存
        Cookie，請在網頁瀏覽器的安全性設定中採取必要步驟，封鎖來自本網站及其外部服務供應商的所有
        Cookie。</p>
      social_media: 社群媒體平台
      social_media_description: >-
        <p>在本網站參與的外部社群媒體平台上溝通、互動和採取行動時，分別依各社群媒體平台的條款和隱私權政策而定。</p>
      changes: 變更
      changes_description: >-
        <p>我們會定期檢視隱私權政策，並在此網頁發布更新。我們確保遵守加拿大的《個人資訊保護暨電子文件法》 (PIPEDA)
        和歐盟的《一般資料保護規則》 (GDPR EU)。</p><p>本隱私權政策最後更新於 2024 年 2 月 11 日。</p>
      contact: 聯絡我們
      contact_description: >-
        <p class="noMarginBottom">如有任何疑問或顧慮，請%{email_link}。</p>
