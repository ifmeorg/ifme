        制定自我照護策略，朝著您對心情記事的理想態度和想法邁進。
      premade1_name: 五分鐘冥想
      premade1_description: >-
        1) <b>找到一個放鬆、舒適的姿勢。</b>您可以坐在椅子上，或坐在地板的坐墊上。保持背部挺直，但不要太緊繃。雙手放在舒適的位置。舌頭抵住上顎，或放在舒適的位置。<br
        /><br />2) <b>注意並放鬆您的身體。</b>試著注意身體的形狀和重量。讓自己放鬆，對坐在這裡的身體感到好奇——它所經歷的感覺、觸感、與地板或椅子的接觸。放鬆任何緊繃的部位，只管呼吸。<br
        /><br />3) <b>將注意力放在呼吸上。</b>感受自然的呼吸流動——吸氣、吐氣。不需要刻意控制呼吸，不長不短，順其自然。注意您在身體哪裡感受到呼吸，可能在腹部、胸腔、喉嚨或鼻孔。試著一次感受一個呼吸，一個呼吸結束，下一個呼吸開始。<br
        /><br />4)
        <b>善待游移的心。</b>在這過程中，您可能會發現思緒開始飄移，開始想其他事情。如果發生了，這完全沒問題，非常自然。只要注意到思緒已經飄走就好。您可以在心裡輕聲說「正在想」或「飄走了」，然後溫柔地將注意力帶回呼吸上。<br
        /><br />5) <b>在此停留五到七分鐘。</b>在安靜中注意您的呼吸。偶爾思緒會飄走，然後再回到呼吸上。<br
        /><br />6)
        <b>結束前做個回顧。</b>幾分鐘後，再次注意您的身體，整個身體，坐在這裡。讓自己更加深層地放鬆，然後感謝自己今天做了這個練習。<br
        /><br /><i>取自
        http://www.mindful.org/a-five-minute-breathing-meditation/ </i>
