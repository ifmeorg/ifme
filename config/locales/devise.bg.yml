bg:
  devise:
    confirmations:
      confirmed: Имейл адресът ти е потвърден успешно.
      send_instructions: След няколко минути ще получиш имейл с инструкции как да потвърдиш имейл адреса си.
      send_paranoid_instructions: Ако имейл адресът ти съществува в нашата база данни, ще получиш имейл с инструкции как да потвърдиш имейл адреса си след няколко минути.
    failure:
      already_authenticated: Вече си влязъл/а.
      inactive: Акаунтът ти все още не е активиран.
      invalid: 'Невалиден %{authentication_keys} или парола.'
      locked: Акаунтът ти е заключен.
      last_attempt: Имаш още един опит, преди акаунтът ти да бъде заключен.
      not_found_in_database: 'Невалиден %{authentication_keys} или парола.'
      timeout: Сесията ти изтече. Влез отново, за да продължиш.
      unauthenticated: Трябва да влезеш или да се регистрираш, преди да продължиш.
      unconfirmed: Трябва да потвърдиш имейл адреса си, преди да продължиш.
    mailer:
      confirmation_instructions:
        subject: if-me.org | Инструкции за потвърждение
      reset_password_instructions:
        subject: if-me.org | Инструкции за нулиране на паролата
      unlock_instructions:
        subject: if-me.org | Инструкции за отключване
      password_change:
        subject: if-me.org | Паролата е променена
    omniauth_callbacks:
      failure: 'Не можахме да те удостоверим от %{kind}, защото "%{reason}".'
      success: 'Успешно удостоверяване чрез %{kind} акаунт.'
    passwords:
      no_token: Не можеш да получиш достъп до тази страница, без да дойдеш от имейл за повторно задаване на парола. Ако идваш от имейл за повторно задаване на парола, увери се, че си използвал/а предоставения пълен URL адрес.
      send_instructions: След няколко минути ще получиш имейл с инструкции как да нулираш паролата си.
      send_paranoid_instructions: Ако имейл адресът ти съществува в нашата база данни, ще получиш връзка за възстановяване на паролата на имейл адреса си след няколко минути.
      updated: Паролата ти е променена успешно. Вече си влязъл/а.
      updated_not_active: Паролата ти е променена успешно.
    registrations:
      destroyed: Довиждане! Акаунтът ти беше закрит успешно. Надяваме се скоро да се видим отново.
      signed_up: Добре дошъл/дошла! Регистрира се успешно.
      signed_up_but_inactive: Регистрира се успешно. Въпреки това не можахме да те впишем, защото акаунтът ти все още не е активиран.
      signed_up_but_locked: Регистрира се успешно. Въпреки това не можахме да те впишем, защото акаунтът ти е заключен.
      signed_up_but_unconfirmed: На имейл адреса ти е изпратено съобщение с връзка за потвърждение. Следвай връзката, за да активираш акаунта си.
      update_needs_confirmation: Успешно актуализира акаунта си, но трябва да потвърдим новия ти имейл адрес. Провери имейла си и следвай връзката за потвърждение, за да потвърдиш новия си имейл адрес.
      updated: Акаунтът ти е актуализиран успешно.
    sessions:
      signed_in: Влезе успешно.
      signed_out: Излезе успешно.
      already_signed_out: Излезе успешно.
    unlocks:
      send_instructions: След няколко минути ще получиш имейл с инструкции как да отключиш акаунта си.
      send_paranoid_instructions: Ако акаунтът ти съществува, ще получиш имейл с инструкции как да го отключиш след няколко минути.
      unlocked: Акаунтът ти е отключен успешно. Влез, за да продължиш.
  errors:
    messages:
      already_confirmed: 'вече беше потвърдено, опитай да влезеш'
      confirmation_period_expired: 'трябва да бъде потвърден в рамките на %{period}, заяви нов'
      expired: 'е изтекъл, заяви нов'
      not_found: не е намерено
      not_locked: не беше заключено
      not_saved:
        one: '1 грешка попречи този %{resource} да бъде запазен:'
        other: '%{count} грешки попречиха този %{resource} да бъде запазен:'
      pwned_password: преди това се е появявал при нарушение на сигурността на данните и никога не трябва да се използва. Ако някога си го използвал/а някъде преди, смени го незабавно!
