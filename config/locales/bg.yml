    index:
      subtitle: Създай стратегия за грижа за себе си, за да постигнеш желаните мисли и отношение към моментите си.
      premade1_name: Петминутна медитация
      premade1_description: 1) <b>Намери спокойна, удобна позиция. </b> Можеш да седнеш на стол или на пода върху възглавница. Дръж гърба си изправен, но не прекалено стегнат. Ръцете почиват, където им е удобно. Езикът е на небцето или където ти е удобно. <br /><br />2)<b>Забележи и отпусни тялото си.</b> Опитай се да забележиш формата на тялото си, теглото му. Остави се да се отпуснеш и стани любопитен за тялото си, седнало тук - усещанията, които изпитва, докосването, връзката с пода или стола. Отпусни всички области на стягане или напрежение. Просто дишай.<br /><br />3) <b>Настрой се към дъха си.</b> Почувствай естествения поток на вдишване - навътре, на издишване. Не е нужно да правиш нищо с дъха си. Нито дълго, нито кратко, просто естествено. Забележи къде усещаш дъха си в тялото си. Може да е в корема ти. Може да е в гърдите или гърлото или в ноздрите ти. Виж дали можеш да почувстваш усещането за дъх, един дъх наведнъж. Когато един дъх приключи, следващият
        дъх започва.<br /><br />4) <b>Бъди мил към блуждаещия си ум.</b> Сега, докато правиш това, може да забележиш, че умът ти може да започне да блуждае. Може да започнеш да мислиш за други неща. Ако това се случи, не е проблем. Това е много естествено. Просто забележи, че умът ти е блуждаел. Можеш тихо да кажеш "мислене" или "лутане" в главата си. И след това внимателно пренасочи вниманието си обратно към дишането. <br /><br />5) <b>Остани тук пет до седем минути. </b> Забележи дъха си, в тишина. От време на време ще се изгубиш в мисли, след което ще се върнеш към дъха си.<br /><br />6) <b>Провери как си, преди да приключиш. </b> След няколко минути отново забележи тялото си, цялото си тяло, седнало тук. Позволи си да се отпуснеш още по-дълбоко и след това си дай кратка оценка за тази практика днес. <br /><br /><i>Взето от http://www.mindful.org/a-five-minute-breathing-meditation/ </i>
      instructions: Все още нямаш персонализирани стратегии.<br />Можеш също да добавиш следната предварително направена стратегия и да я персонализираш друг път.
