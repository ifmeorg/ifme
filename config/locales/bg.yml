      main_message_one: '%{app_name} е общност за преживявания в областта на психичното здраве, която насърчава хората да споделят личните си истории с доверени хора.'
      message_text_one: Доверените хора са онези, с които общуваме всеки ден, включително приятели, семейство, колеги, учители и специалисти по психично здраве.
      main_message_two: Справянето с психичното здраве е това, което ни прави хора. Но за много от нас е трудно да бъдем открити за това.
      message_text_two: Не всеки е съветник или терапевт. Хората, с които общуваме всеки ден, оформят нашите емоции и поведение. Включването им в лечение на психичното здраве е ключът към възстановяването.
      message_text_three: <strong>Искаш ли да помогнеш с финансирането ни?</strong> През 2016 г. получихме общностен грант от Linebreak. През 2017 г. получихме финансиране от %{fund_club_link}. Можеш да ни подкрепиш с дарение в %{open_collective_link}.
      fund_club: Фонд Клуб
    blog:
      description: Ако искаш да пишеш за нас, пиши ни на %{email}! Приветстваме и анонимни заявления.
    contribute:
      contributor_avatar_alt: 'Биография на сътрудник за %{name}'
      message_text_one: Винаги търсим идеи от всички, включително <strong>защитници на психичното здраве</strong>, <strong>здравни специалисти</strong>, <strong>разработчици на софтуер</strong>, <strong>преводачи</strong> и <strong>дизайнери на потребителско изживяване</strong>! <p class="noMarginBottom">Пиши ни на %{email_link} и ще се свържем с теб! Ще бъдеш поканен да участваш в нашия %{slack_link}, основния ни инструмент за комуникация. Не забравяй да форкнеш нашето хранилище в %{github_link}!</p>
      more_contributors: Още невероятни сътрудници!
      thanks: Огромни благодарности на
      slack: Slack
    faq:
      title: Често задавани въпроси
      data_access_question: Кой има достъп до моите данни?
      data_access_answer: Данните не се предоставят и не се предоставят на трети страни. Изтриването на акаунта ти ще премахне всички твои данни.<br /><br />Потребителските данни се анализират в рамките на уебсайта, за да предоставят персонализирани препоръки.<br /><br />Името и имейл адресът за събиране са необходими за създаване на потребителски акаунт. Ако даден потребител е удостоверен чрез Facebook или Google, неговата профилна снимка и име ще се използват в акаунта му.
      moment_question: Какво е Момент?
      moment_answer: <strong>%{moment}</strong> е събитие или ситуация, която влияе на психичното ти здраве. То може да бъде положително или отрицателно. Мисли за него като за запис в дневник или обновяване на състоянието.<br /><br />Можеш да отбелязваш моментите със стратегии, категории и настроения. Можеш също да избираш кои близки да ги виждат и коментират. Можеш и да направиш моментите видими само за теб.<br /><br /><strong>%{moment_templates}</strong> ти позволяват да създаваш шаблони за писане, които да използваш отново.
      strategy_question: Какво е Стратегия?
      strategy_answer: <strong>%{strategy}</strong> е дейност, начин на мислене или форма на грижа за себе си, която ти помага да се справяш или да се съсредоточиш върху възстановяването.<br /><br />Можеш да отбелязваш стратегиите с категории. Можеш също да избираш кои близки да ги виждат и коментират. Можеш и да направиш стратегиите видими само за теб. Споделените стратегии ще бъдат видими за всички избрани близки, което означава, че можеш да отбелязваш моментите си с техните стратегии!
      category_question: Какво е Категория?
      category_answer: <strong>%{category}</strong> е етикет, който може да представлява хората, местата и нещата, които са важни за теб.
      mood_question: Какво е Настроение?
      mood_answer: <strong>%{mood}</strong> е етикет, описващ твоето душевно състояние, чувства и емоции.
      group_question: Какво е Група?
      group_answer: <strong>%{group}</strong> предлага подкрепа, наставничество и разговори за психично здраве. Можеш да създаваш групи, а близките ти имат възможност да се присъединят. Можеш да се присъединяваш само към групи, създадени от твои близки.<br /><br />Като лидер на група можеш да създаваш <strong>Срещи</strong>. Срещите имат място и час. Мястото може да бъде адрес или URL за видеоконференция. Срещите позволяват и коментари. Ако си лидер на група, не можеш да напуснеш групата, освен ако няма друг лидер. Групите могат да бъдат изтрити само когато си единственият член.
      medications_question: Как да използвам функцията за лекарства?
      medications_answer: Функцията <strong>%{medications}</strong> ти позволява да регистрираш лекарствата, отпускани с рецепта, които приемаш. Можеш също да регистрираш симптомите си.
      care_plan_question: Как да използвам функцията "План за грижа"?
      care_plan_answer: Функцията <strong>%{care_plan}</strong> ти позволява да поддържаш списък с близки хора, към които да се обърнеш в трудни моменти, и да отбелязваш любимите си стратегии за грижа за себе си.
      invite_question: Как мога да поканя близките си да се присъединят към приложението?
      invite_answer: Отиди на страницата <strong>%{allies}</strong> и натисни връзката "Покани близките си". Ще можеш да ги поканиш по имейл. Когато твой близък човек приеме поканата, той ще бъде добавен към списъка ти с близки.
      email_notifications_question: Как мога да променя известията по имейл?
      email_notifications_answer: Отиди на страницата <strong>%{accounts}</strong>. Можеш да промениш имейла, паролата, профилната снимка и биографията си тук. Можеш също да изтриеш акаунта си. След като изтриеш акаунта си, всичките ти данни се изтриват.
    home:
      update_pwd_modal:
        title: Актуализиране на паролата
        body: Въведохме по-добри мерки за сигурност за нашите потребители, %{update_password_link}
        update_link: актуализирай паролата си.
      stories: Истории
      not_signed_in:
        main_message_one: По-добрата комуникация с близките води до по-добро психично здраве.
        message_text_one: Нуждаем се от подкрепата един на друг, за да разрушим стигмите.
        message_one: Сподели историите си с близки и получи подкрепата, която заслужаваш
        message_two: 'Бъди себе си, без условия и със сигурност и поверителност'
        message_three: 'Документирай настроенията, лекарствата и грижата за себе си'
        main_message_two: Ние сме с отворен код, защото психичното здраве трябва да бъде отворено.
        message_text_two: Ние <strong>винаги</strong> търсим твоята %{help} и %{feedback}!
        help: помощ
      signed_in_empty:
        main_message_one: 'Здравей %{name}!'
        message_text_one: Ето как можеш да започнеш да споделяш историите си.
        main_message_two: Разкажи ни за себе си.
        cell_one: Персонализирай своя %{profile} - добави биография и профилна снимка <br />Добави свои %{moods}, за да опишеш най-добре емоциите си<br />Добави %{allies} - приятели, семейство и други хора, с които искаш да споделяш
        main_message_three: Пиши историите си.
        cell_two: Създай свои %{categories}, за да организираш моментите си <br />Пиши за %{moments} - събитията и ситуациите, които влияят на психичното ти здраве
        main_message_four: Погрижи се за себе си.
        cell_three: '%{strategize} плана си за грижа за себе си!<br />В момента приемаш %{medications}? Следи ги и създавай напомняния!<br /> Нуждаеш се от допълнителна подкрепа? Присъедини се към %{group} или създай такава, за да се отвориш пред други.'
        main_message_five: Имаш въпроси или притеснения?
        message_text_three: 'Виж страницата %{faq} или %{email_link}!'
        strategize: Планирай
    partners:
      description: Това са невероятните организации, от които сме вдъхновени и сме имали привилегията да работим с тях. Ще се радваме да работим с твоята организация, изпрати ни имейл на %{email}.
    privacy:
      summary: Резюме
      summary_description: <p>Тази политика за поверителност е за този уебсайт и управлява поверителността на неговите потребители, които решат да го използват. </p><p>Като се има предвид чувствителното съдържание на уебсайта, поверителността е изключително важен проблем за нас. Политиката определя как се събират потребителските данни, за какво се използват и как се защитават.</p>
      user_data: Потребителски данни
      user_data_description: <p>Нашата страница %{faq_link} съдържа повече информация за функциите на този уебсайт.</p>
      data_protection_rights: Права за защита на данните
      data_protection_rights_answer: <p>Всеки потребител има право на следното:</p><p>Право на достъп – Потребителите имат право да поискат от нас копия на своите лични данни. За тази услуга може да начислим малка такса.</p><p>Право на коригиране – Потребителите имат право да поискат да коригираме информация, която смятат за неточна. Те също така имат право да поискат да допълним информация, която смятат за непълна.</p><p>Право на изтриване – Потребителите имат право да поискат да изтрием личните им данни при определени условия.</p><p>Право на ограничаване на обработването – Потребителите имат право да поискат да ограничим обработването на личните им данни при определени условия.</p><p>Право на възражение срещу обработването – Потребителите имат право да възразят срещу обработването на личните им данни при определени условия.</p><p>Право на преносимост на данните – Потребителите имат право да поискат да прехвърлим събраните от нас данни на друга организация или директно на тях при определени
        условия.</p><p>Ако бъде направена заявка, имаме един месец, за да ти отговорим.</p>
      cookies: Използване на бисквитки
      cookies_description: <p>Този уебсайт използва бисквитки, за да подобри изживяването на потребителите, докато посещават уебсайта. Функционалните бисквитки се използват за удостоверяване и за запомняне на предварително избрани предпочитания. Те могат да включват предпочитан от теб език и местоположение, на което се намираш. Където е приложимо, този уебсайт използва система за контрол на бисквитките, позволяваща на потребителя при първото си посещение на уебсайта да разреши или забрани използването на бисквитки на своя компютър/устройство. </p><p>Бисквитките са малки файлове, записани на твърдия диск на компютъра на потребителя, които проследяват, запазват и съхраняват информация за взаимодействията на потребителя и използването на уебсайта. Това позволява на уебсайта, чрез своя сървър, да предостави на потребителите персонализирано изживяване в рамките на този уебсайт.</p><p> Потребителите се съветват, че ако желаят да откажат използването и запазването на бисквитки от този уебсайт
        на твърдия диск на компютрите си, те трябва да предприемат необходимите стъпки в настройките за сигурност на своите уеб браузъри, за да блокират всички бисквитки от този уебсайт и неговите външни доставчици за обслужване.</p>
      social_media: Платформи за социални медии
      social_media_description: <p>Комуникацията, ангажираността и действията, предприети чрез външни социални медийни платформи, в които участва този уебсайт, са съобразени с правилата и условията, както и с политиките за поверителност, поддържани съответно с всяка социална медийна платформа.</p>
      changes: Промени
      changes_description: <p>Ние редовно преглеждаме нашата политика за поверителност и поставяме всички актуализации на тази уеб страница. Ние гарантираме, че спазваме Закона за защита на личните данни за електронните документи (PIPEDA) в Канада и Общия регламент за защита на данните на ЕС (GDPR EU) в Европейския съюз.</p><p>Тази политика за поверителност е актуализирана последно на 11 февруари 2024 г.</p>
      contact: Свържи се с нас
      contact_description: <p class="noMarginBottom">%{email_link}, ако имаш въпроси или притеснения.</p>
